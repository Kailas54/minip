{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">


    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- <link href="../css/.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">

</head>

<body>


    <div class="main-content">
        <div class="upload-section">
            <h2 class="text-center mb-4"
                style="font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;">
                Traffic Monitor Dashboard</h2>
            <div class="upload-box" id="upload-box">
                <div class="text-center">
                    <i class="fas fa-cloud-upload-alt fa-4x mb-3"></i>
                    <p style="color: var(--text-muted); font-size: 1.1rem;">Drag and drop or click to upload video</p>
                    <span id="file-name-display"
                        style="display: block; margin-top: 10px; color: var(--primary-color); font-weight: 600;"></span>
                </div>
                <input type="file" id="video-upload" class="video-upload-input" accept=".mp4,.mov">
            </div>
            <button id="upload-button" class="btn-modern w-100">
                <i class="fas fa-upload"></i> Select Video
            </button>
        </div>

        <div class="buttons-section">
            <h3 class="mb-4" style="font-size: 1.5rem; color: var(--text-main);">AI Analysis Suite</h3>
            <div class="analysis-options">
                <div class="option-box" id="detect-vehicles">
                    <i class="fas fa-car" style="color: #6366f1; margin-right: 10px;"></i> Detect Vehicles and
                    Numberplate
                </div>
                <div class="option-box" id="detect-speed">
                    <i class="fas fa-tachometer-alt" style="color: #a855f7; margin-right: 10px;"></i> Detect Speed
                </div>
                <div class="option-box" id="extract-numberplate">
                    <i class="fas fa-list-alt" style="color: #f43f5e; margin-right: 10px;"></i> Extract Number Plate
                </div>
            </div>
        </div>
    </div>
    <div class="output-video-section">
        <video id="output-video" controls></video>
    </div>

    <!-- Results Modal -->
    <div class="modal fade" id="resultsModal" tabindex="-1" aria-labelledby="resultsModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content glass-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="resultsModalLabel"><i class="fas fa-poll-h"></i> Analysis Results</h5>
                    <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body" id="modal-results-content">
                    <!-- Results or Spinner will be injected here -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-modern" style="padding: 10px 20px;"
                        data-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>





    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>

</html>
